<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="trainerTitle">Dragon Gym | Trainer Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #ff3e3e;
            --secondary: #ff9d00;
            --bg-dark: #0a0b10;
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #909090;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        nav.sidebar {
            width: 260px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--card-border);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            position: fixed;
            height: 100vh;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
        }

        .nav-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-dim);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
        }

        .nav-item.active {
            background: rgba(255, 62, 62, 0.1);
            color: var(--primary);
            border: 1px solid rgba(255, 62, 62, 0.2);
        }

        /* Main Content */
        main.content {
            flex: 1;
            padding: 2.5rem;
            margin-left: 260px;
            overflow-y: auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .client-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .client-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 1.5rem;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
        }

        .btn-action {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="logo" id="sideLogo"><i data-lucide="shield"></i> Dragon Gym</div>
            <ul class="nav-links">
                <li><a href="#" class="nav-item active"><i data-lucide="users"></i> My Clients</a></li>
                <li><a href="index.html" class="nav-item"><i data-lucide="layout-dashboard"></i> Dashboard</a></li>
                <li><a href="login.html" class="nav-item"><i data-lucide="log-out"></i> Logout</a></li>
            </ul>
        </nav>

        <main class="content">
            <header>
                <div>
                    <h1>Trainer Hub</h1>
                    <p style="color: var(--text-dim);">Managing dragon-tier warriors.</p>
                </div>
                <div style="background: var(--card-bg); padding: 8px 16px; border-radius: 20px; border: 1px solid var(--card-border);">
                    <span id="currentTime">01:01 PM</span>
                </div>
            </header>

            <h3>Active Clients (12)</h3>
            <div class="client-grid" style="margin-top: 1.5rem;">
                <div class="client-card">
                    <div style="display: flex; justify-content: space-between; align-items: start;">
                        <div style="display: flex; gap: 1rem; align-items: center;">
                            <div class="avatar"></div>
                            <div>
                                <p style="font-weight: 700;">Sarah Johnson</p>
                                <p style="color: var(--text-dim); font-size: 0.8rem;">Goal: Strength Gain</p>
                            </div>
                        </div>
                        <span style="color: #00ff80; font-size: 0.75rem;">● Active</span>
                    </div>
                    <div style="margin-top: 1.5rem; display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <p style="color: var(--text-dim); font-size: 0.7rem;">Session</p>
                            <p style="font-weight: 600;">Leg Day</p>
                        </div>
                        <button class="btn-action">Update Routine</button>
                    </div>
                </div>

                <div class="client-card">
                    <div style="display: flex; justify-content: space-between; align-items: start;">
                        <div style="display: flex; gap: 1rem; align-items: center;">
                            <div class="avatar" style="background: linear-gradient(45deg, #ff9d00, #ff3e3e);"></div>
                            <div>
                                <p style="font-weight: 700;">Mark Thompson</p>
                                <p style="color: var(--text-dim); font-size: 0.8rem;">Goal: Weight Loss</p>
                            </div>
                        </div>
                        <span style="color: var(--text-dim); font-size: 0.75rem;">● Offline</span>
                    </div>
                    <div style="margin-top: 1.5rem; display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <p style="color: var(--text-dim); font-size: 0.7rem;">Session</p>
                            <p style="font-weight: 600;">Chest Day</p>
                        </div>
                        <button class="btn-action">Update Routine</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        const gymName = localStorage.getItem('gymName') || 'Dragon Gym';
        document.getElementById('trainerTitle').textContent = `${gymName} | Trainer Hub`;
        document.getElementById('sideLogo').innerHTML = `<i data-lucide="shield"></i> ${gymName}`;

        setInterval(() => {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }, 1000);
    </script>
</body>

</html>
