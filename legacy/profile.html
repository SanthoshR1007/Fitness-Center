<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="profileTitle">Dragon Gym | Profile Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #ff3e3e;
            --secondary: #ff9d00;
            --bg-dark: #0a0b10;
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #909090;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        nav.sidebar {
            width: 260px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--card-border);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            position: fixed;
            height: 100vh;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
        }

        .nav-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-dim);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
        }

        .nav-item.active {
            background: rgba(255, 62, 62, 0.1);
            color: var(--primary);
            border: 1px solid rgba(255, 62, 62, 0.2);
        }

        /* Main Content */
        main.content {
            flex: 1;
            padding: 2.5rem;
            margin-left: 260px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .profile-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 30px;
            padding: 3rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .avatar-section {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .avatar-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            padding: 14px;
            border-radius: 12px;
            color: white;
            outline: none;
            font-size: 1rem;
        }

        .btn-save {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            padding: 14px 30px;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1rem;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 62, 62, 0.2);
        }

        .btn-logout {
            background: transparent;
            border: 1px solid #ff3e3e;
            color: #ff3e3e;
            padding: 14px 30px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-left: 1rem;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="logo" id="sideLogo"><i data-lucide="shield"></i> Dragon Gym</div>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-item"><i data-lucide="layout-dashboard"></i> Dashboard</a></li>
                <li><a href="booking.html" class="nav-item"><i data-lucide="calendar"></i> Book Slot</a></li>
                <li><a href="#" class="nav-item active"><i data-lucide="user"></i> My Profile</a></li>
                <li><a href="login.html" class="nav-item"><i data-lucide="log-out"></i> Logout</a></li>
            </ul>
        </nav>

        <main class="content">
            <header>
                <h1>Account Settings</h1>
            </header>

            <div class="profile-card">
                <div class="avatar-section">
                    <div class="avatar-circle">AR</div>
                    <div>
                        <h2>Alex Rivera</h2>
                        <p style="color: var(--text-dim);">Platinum Tier Member</p>
                    </div>
                </div>

                <form onsubmit="saveProfile(event)">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" value="Alex Rivera" required>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" value="alex.rivera@dragon.com" required>
                        </div>
                        <div class="form-group">
                            <label>Weight (kg)</label>
                            <input type="number" value="78">
                        </div>
                        <div class="form-group">
                            <label>Height (cm)</label>
                            <input type="number" value="182">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Physical Address</label>
                        <textarea rows="3">123 Dragon Valley, Warrior District, Cyber City</textarea>
                    </div>

                    <div style="margin-top: 2rem;">
                        <button type="submit" class="btn-save">Save Profile Changes</button>
                        <button type="button" class="btn-logout" onclick="location.href='login.html'">Logout Session</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        const gymName = localStorage.getItem('gymName') || 'Dragon Gym';
        document.getElementById('profileTitle').textContent = `${gymName} | Profile`;
        document.getElementById('sideLogo').innerHTML = `<i data-lucide="shield"></i> ${gymName}`;

        function saveProfile(e) {
            e.preventDefault();
            alert('Profile updated successfully!');
        }
    </script>
</body>

</html>
